name: tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore TrmnlApi.slnx

      - name: Build
        run: dotnet build TrmnlApi.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test TrmnlApi.slnx --configuration Release --no-build --verbosity normal
